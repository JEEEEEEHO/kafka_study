<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Kafka Study</title>
</head>
<body>
<h1>UI → Producer API → Kafka → AKHQ</h1>

<select id="type">
    <option value="CLICK">CLICK</option>
    <option value="VIEW">VIEW</option>
    <option value="BUY">BUY</option>
</select>
<input id="msg" type="text" placeholder="message" />
<button id="btn">1개 전송</button>
<button id="btn-bulk">5개 연속 전송</button>
<pre id="out"></pre>

<script>
    const out = document.getElementById("out");

    async function sendMessage(type, message) {
        const res = await fetch("/api/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ type, message }),
        });
        return res.json();
    }

    // 1개 전송
    document.getElementById("btn").addEventListener("click", async () => {
        const type = document.getElementById("type").value;
        const message = document.getElementById("msg").value;
        const json = await sendMessage(type, message);
        out.textContent = JSON.stringify(json, null, 2);
    });

    // 5개 연속 전송
    document.getElementById("btn-bulk").addEventListener("click", async () => {
        const type = document.getElementById("type").value;
        const results = [];

        for (let i = 1; i <= 5; i++) {
            const json = await sendMessage(type, `${type} message ${i}`);
            results.push(json);
        }

        out.textContent = JSON.stringify(results, null, 2);
    });
</script>
</body>
</html>
